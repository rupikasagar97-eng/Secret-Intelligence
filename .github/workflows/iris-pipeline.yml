name: Iris Pipeline Execution

on:
  push:
    branches: [ main ]
  # 🎛️ This adds the interactive "Run Workflow" button in GitHub Actions
  workflow_dispatch:
    inputs:
      test_key:
        description: 'Enter any key to test (Stripe, AWS, or custom mock string)'
        required: true
        default: 'sk_live_mock_test_key_value_12345'

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Live Test Execution
      # This grabs whatever you typed in the input box, or defaults to the Stripe mock key
      run: python iris_engine.py --key "${{ github.event.inputs.test_key }}"
