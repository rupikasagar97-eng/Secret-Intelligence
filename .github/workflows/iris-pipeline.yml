name: Secret Intelligence & Iris Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Pipeline Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Iris Microservice Compiles Successfully
      run: |
        python -m py_compile iris_engine.py

    - name: 🚀 RUN LIVE TEST: Evaluate Security Key
      run: |
        echo "🔑 Injecting Test Security Key into Iris Engine..."
        python iris_engine.py --key "SAFE_IRIS_2026_TOKEN"
